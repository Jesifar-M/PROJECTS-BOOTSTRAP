<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Profile</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
    <div class="container mt-5">
        <!-- Heading -->
        <h1 class="display-4 text-center mb-4">Student Profile</h1>

        <!-- Blockquote -->
        <blockquote class="blockquote text-center fst-italic mb-4">
            <p class="mb-0">"Learning never exhausts the mind."</p>
        </blockquote>

        <!-- Circular Profile Image -->
        <img src="STUDENT-IMG.png" alt="Student Profile" class="rounded-circle mx-auto d-block" width="150" height="150">

        <!-- Table -->
        <table class="table table-striped table-hover mt-4">
            <thead class="table-dark">
                <tr>
                    <th>Subject</th>
                    <th>Marks Scored</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>Mathematics</td>
                    <td>95</td>
                </tr>
                <tr>
                    <td>English</td>
                    <td>87</td>
                </tr>
                <tr>
                    <td>Science</td>
                    <td>92</td>
                </tr>
            </tbody>
        </table>

        <!-- Green Alert Message -->
        <div class="alert alert-success mt-4" role="alert">
            Profile updated successfully!
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>
</body>
</html>
