<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Course Progress Dashboard</title>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container py-5">
         <div class="row justify-content-center">
         </div><div class="col-12 col-md-8">
          <nav aria-label="breadcrumb" class="py-2">
            <ol class="breadcrumb mb-0">
              <li class="breadcrumb-item"><a href="https://www.mashupstack.com">Home</a></li>
              <li class="breadcrumb-item"><a href="https://www.mashupstack.com/list-courses">Courses</a></li>
              <li class="breadcrumb-item"><a href="https://www.mashupstack.com">Web Development</a></li>
            </ol>
          </nav>

          <div class="text-center mb-4">
            <h1 class="display-6">Web Development Course <span class="badge bg-primary ms-2">New</span></h1>
          </div>

          <div class="d-flex justify-content-center mb-4">
            <div class="btn-group" role="group" aria-label="Course actions">
              <button type="button" class="btn btn-primary">Start</button>
              <button type="button" class="btn btn-secondary">Pause</button>
              <button type="button" class="btn btn-danger">Reset</button>
            </div>
          </div>

          <div class="mb-3">
            <div class="progress mb-3" style="height: 2rem;">
              <div class="progress-bar bg-success progress-bar-striped" role="progressbar" style="width: 100%" aria-valuenow="100" aria-valuemin="0" aria-valuemax="100">HTML – 100% complete</div>
            </div>
            <div class="progress mb-3" style="height: 2rem;">
              <div class="progress-bar bg-primary progress-bar-striped progress-bar-animated" role="progressbar" style="width: 75%" aria-valuenow="75" aria-valuemin="0" aria-valuemax="100">CSS – 75% complete</div>
            </div>
            <div class="progress mb-3" style="height: 2rem;">
              <div class="progress-bar bg-warning" role="progressbar" style="width: 50%" aria-valuenow="50" aria-valuemin="0" aria-valuemax="100">JavaScript – 50% complete</div>
            </div>
            <div class="progress" style="height: 2rem;">
              <div class="progress-bar bg-danger" role="progressbar" style="width: 25%" aria-valuenow="25" aria-valuemin="0" aria-valuemax="100">Bootstrap – 25% complete</div>
            </div>
          </div>

          <nav aria-label="Page navigation">
            <ul class="pagination justify-content-center mb-0">
              <li class="page-item active" aria-current="page"><a class="page-link" href="#">1</a></li>
              <li class="page-item"><a class="page-link" href="#">2</a></li>
              <li class="page-item disabled"><a class="page-link" href="#">3</a></li>
            </ul>
          </nav>
        </div>
      </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.0/js/bootstrap.bundle.min.js"></script>

</body>
</html>
